<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<link rel="stylesheet" href="style.css">
	<title>WebKara</title>
</head>
<body>
	<div id="world-panel">
		<table id="board"></table>
		<div>
			<button id="btnMove">move</button>
			<button id="btnLeft">turn left</button>
			<button id="btnRight">turn right</button>
			<button id="btnPut">put leaf</button>
			<button id="btnTake">take leaf</button>
		</div>
		<div>
			<button id="placeKara">&#8680;</button>
			<button id="placeLeafs">&#9752;</button>
			<button id="placeTrees">&#9820;</button>
			<button id="placeShrooms">&#9730;</button>
		</div>
	</div>
	<div id="editor-panel">
		<div id="code-editor" contenteditable="true" spellcheck="false"></div>
		<button id="runBtn">run</button>
	</div>

	<script type="module" src="js/frontend/main.js"></script>
</body>
</html>
